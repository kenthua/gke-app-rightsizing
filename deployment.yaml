apiVersion: apps/v1
kind: Deployment
metadata:
  name: podinfo
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: podinfo
  template:
    metadata:
      labels:
        app: podinfo
    spec:
      containers:
      - name: podinfo
        image: stefanprodan/podinfo:6.14.0
        command:
        - ./podinfo
        args:
        - --port-metrics=9797
        ports:
        - name: http
          containerPort: 9898
        - name: http-metrics
          containerPort: 9797
        resources:
          requests:
            cpu: "2"
            memory: "256Mi"
          limits:
            cpu: "2"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: podinfo
  namespace: default
spec:
  ports:
  - name: http
    port: 80
    targetPort: http
  - name: http-metrics
    port: 9797
    targetPort: http-metrics
  selector:
    app: podinfo
---
apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: podinfo
  namespace: default
  labels:
    app: podinfo
spec:
  selector:
    matchLabels:
      app: podinfo
  endpoints:
  - port: http-metrics
    path: /metrics
    interval: 15s
